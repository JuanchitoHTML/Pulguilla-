<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi primera página</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#121212;
    color:white;
    font-family:Arial, sans-serif;
}

h1{
    font-size:40px;
    margin-bottom:10px;
}

p{
    font-size:18px;
    margin-bottom:20px;
}

button{
    padding:12px 24px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#00bfff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0099cc;
}
</style>
</head>

<body>

<h1>¡Hola, Juan! 👋</h1>
<p>Esta es mi primera página web.</p>

<button onclick="saludar()">Haz clic aquí</button>

<script>
function saludar(){
    alert("¡Felicidades! Tu página web funciona. 🎉");
}
</script>

</body>
</html>
